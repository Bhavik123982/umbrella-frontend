<!DOCTYPE html>
<html>
<head>
  <title>Umbrella Academy</title>
  <style>
    body {
      font-family: Arial;
      max-width: 800px;
      margin: auto;
      padding: 20px;
      background: #f9f9f9;
    }

    h1 { text-align: center; }

    select, button {
      padding: 10px;
      margin: 5px;
    }

    #prompt {
      background: #fff;
      padding: 15px;
      margin-top: 15px;
      border-left: 5px solid #333;
    }

    textarea {
      width: 100%;
      height: 200px;
      margin-top: 10px;
      padding: 10px;
    }
  </style>
</head>
<body>

<h1>☂️ Umbrella Academy</h1>

<select id="task">
  <option value="task1">Task 1 - Email</option>
  <option value="task2">Task 2 - Survey</option>
</select>

<select id="level">
  <option value="easy">Easy</option>
  <option value="medium">Medium</option>
  <option value="hard">Hard</option>
</select>

<button onclick="start()">Start</button>

<div id="prompt">Click Start to get a question</div>

<textarea id="text" placeholder="Start typing here..."></textarea>

<p>Words: <span id="words">0</span></p>
<p>Time: <span id="time">0</span>s</p>

<script>
let timer = 0;
let interval;

function start() {
  const task = document.getElementById("task").value;
  const level = document.getElementById("level").value;

  fetch(`https://umbrella-backend-y6lp.onrender.com{task}/${level}`)

    .then(res => res.json())
    .then(data => {
      document.getElementById("prompt").innerText = data.prompt;
    });

  clearInterval(interval);
  timer = 0;

  interval = setInterval(() => {
    timer++;
    document.getElementById("time").innerText = timer;
  }, 1000);
}

document.getElementById("text").addEventListener("input", () => {
  let text = document.getElementById("text").value.trim();
  let words = text ? text.split(/\s+/).length : 0;
  document.getElementById("words").innerText = words;
});
</script>

</body>
</html>
